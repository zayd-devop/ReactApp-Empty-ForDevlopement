// Exercice 5: Pures fonctions et Arrays 
// Soit l’Array :
const inscriptions=[
{id:10,nom:'Rami',filiere:'DEV'},
{id:11,nom:'Kamali',filiere:'DEV'},
{id:12,nom:'Fahmi',filiere:'DEV'},
{id:13,nom:'Chaouki',filiere:'DEV'}
];
// Créer la pure fonction qui permet d’ajouter une inscription
// La fonction pure
const ajouterInscription = (inscriptions, nouvelleInscription) => {
    // On retourne un NOUVEAU tableau composé de l'ancien contenu (...) + le nouveau
    return [...inscriptions, nouvelleInscription];
};
// --- Test de la fonction ---
const nouveauStagiaire = { id: 14, nom: 'Alami', filiere: 'DEV' };
// Création du nouveau tableau mis à jour
const nouvellesInscriptions = ajouterInscription(inscriptions, nouveauStagiaire);
// Vérifications
console.log("Tableau original :", inscriptions.length); 
console.log("Nouveau tableau :", nouvellesInscriptions.length);    
console.log(nouvellesInscriptions);
