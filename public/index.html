<!DOCTYPE html>
<html lang="en">
<head>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
<script src="https://unpkg.com/react@16/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@16/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <style>
   .card {
    width: auto;
    padding: 10px;
    margin-right:20px ;
   }
   .addBtn {
    background-color: white;
    border-radius: 20px;
    color: grey;
    border: solid 0.5px ;
   }
  </style>
<div id="root"></div>
</body>
<script type="text/babel">
const products = [
{
id: 1,
title: 'PC Portable Gamer HP VICTUS', price: '7490 DH',
thumbnail : 'HP16D0195NF.jpg'
},
{
id: 2,
title: 'PC Portable Gamer HP VICTUS', price: '2190 DH',
thumbnail : 'HP14424U3EA.jpg'
},
{
id: 3,
title: 'Pc Portable Chromebook Acer', price: '3640 DH',
thumbnail: 'NXATHEF002.jpg'
},
{
id: 4,
title: 'PC Portable - HUAWEI', price: '1270 DH',
thumbnail: 'HUA6901443442959.jpg'
},
];
function Product (props) {
  return (
    <div className='card'>
      <div>
      <img className='pic' src={`${props.data.thumbnail}`} alt=""/>
      </div>
      <div>
      <p>{props.data.title}</p>
      <p>{props.data.price}</p>
      </div>
      <div>
      <button className='addBtn'>Ajouter au panier</button>
    </div>
      </div>
    

  )
}

function Products(){
  return (
    <div className='container'>
      <div className='row'>
        {
          products.map((product,index) =>{
            return <Product key={index} data ={product} /> 
          })
        }
      </div>
    </div>
  )
}

ReactDOM.render(<Products />, document.getElementById("root"));
</script>
</html>
